                  - 'row "Why is the search tool not finding the monologue I''m searching for? The search engine on the site is not as advanced as search websites (e.g. Google.) The search tool on this site will look for exactly what you type, more or less. Punctuation doesn''t matter, but spelling does (note: Elizabethan English had different spellings for many words.)" [ref=e81]':
