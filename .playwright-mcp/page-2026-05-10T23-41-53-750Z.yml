                      - generic [ref=e66]: Why is the text of a monologue on this site a little different from the copy I have?
                      - generic [ref=e67]:
                        - text: Different versions of Shakespeare's works have variations in the text because each publishing house hired a different group of 'editors' who, working primarily with the
                        - link "First Folio of 1623" [ref=e68] [cursor=pointer]:
                          - /url: //sceti.library.upenn.edu/sceti/printedbooksNew/index.cfm?TextID=firstfolio&PagePosition=3
                        - text: ", set to ink their own \"interpretation\" and \"improvements\" upon the text found in the First Folio. The folio is the oldest available"
                        - emphasis [ref=e69]: full
                        - text: printing of the complete works, and is closer to how the plays were originally performed.
                        - link "*" [ref=e70] [cursor=pointer]:
                          - /url: "#*"
                        - text: The spellings, punctuation (or lack thereof) and other conventions used in the folio contain hints for actors which are lost in the later versions through "corrections" and other edits made by the editors of more recent generations. This site uses text from The Globe editions because that is the text used by the
                        - link "Open Source Shakespeare" [ref=e71] [cursor=pointer]:
                          - /url: //www.opensourceshakespeare.org/
                        - text: to which I link for each entry.
                        - text: I suggest you use the
                        - link "Riverside" [ref=e72] [cursor=pointer]:
                          - /url: //smile.amazon.com/Riverside-Shakespeare-2nd-William/dp/0395754909
                        - text: ", the"
                        - link "Arden" [ref=e73] [cursor=pointer]:
                          - /url: //smile.amazon.com/Arden-Shakespeare-Complete-Works/dp/1408152010
                        - text: ", the"
                        - link "Cambridge" [ref=e74] [cursor=pointer]:
                          - /url: //smile.amazon.com/s/ref=nb_sb_noss_1?tag=shakessmonolo-20&linkCode=sb1&camp=212353&creative=380553&url=search-alias%3Dstripbooks&field-keywords=The%20New%20Cambridge%20Shakespeare
                        - text: ", the"
                        - link "Penguin/Pelican" [ref=e75] [cursor=pointer]:
                          - /url: //smile.amazon.com/Complete-Pelican-Shakespeare-William/dp/0141000589/ref=sr_1_1?s=books&ie=UTF8&qid=1398033273&sr=1-1&tag=shakessmonolo-20&linkCode=sb1&camp=212353&creative=380553
                        - text: or the
                        - link "Folger" [ref=e76] [cursor=pointer]:
                          - /url: //smile.amazon.com/s/ref=nb_sb_noss_1?tag=shakessmonolo-20&linkCode=sb1&camp=212353&creative=380553&url=search-alias%3Dstripbooks&field-keywords=Folger+shakespeare+library&rh=n%3A283155%2Ck%3AFolger+shakespeare+library
                        - text: editions of the plays for your audition or classwork.
                        - text: When in doubt, check
                        - link "The Folio" [ref=e77] [cursor=pointer]:
                          - /url: //sceti.library.upenn.edu/sceti/printedbooksNew/index.cfm?TextID=firstfolio&PagePosition=3
                        - text: .
                  - row "Why are the line numbers on this site different from the line numbers in the copy I have? The line numbers I've listed in the index of monologues may differ (by up to 10 lines or so) from the hard copy version you have in your home/school/theatre. This is common as the line numbers vary from edition to edition." [ref=e78]:
