                  - row "Can you suggest a monologue for me? Alas, no. I cannot. Only someone who has seen you act can suggest an appropriate monologue to show off the uniqueness that is you. Ask a friend, teacher, director, or someone else who has seen you act in class or in performance. Perhaps pose the question to your friends on social media. If you're not an actor, but are required to memorize a monologue for a non-acting class, just pick one you've heard of, or one that sounds interesting to you." [ref=e84]:
                    - cell "Can you suggest a monologue for me? Alas, no. I cannot. Only someone who has seen you act can suggest an appropriate monologue to show off the uniqueness that is you. Ask a friend, teacher, director, or someone else who has seen you act in class or in performance. Perhaps pose the question to your friends on social media. If you're not an actor, but are required to memorize a monologue for a non-acting class, just pick one you've heard of, or one that sounds interesting to you." [ref=e85]:
