                  - row "Why are \"Double Falsehood\", \"The Reign of Edward III\" and other \"lost plays\" not included? This site is faithful to the First Folio. I'm not interested in any aspects of the \"Authorship Debate\" because the question of \"who really wrote the plays\" is completely irrelevant to acting in, or directing, the plays. The \"lost plays\" or \"new plays\" have become a part of that debate, so to avoid that controversy altogether I stick with the original complete works as published in the First Folio." [ref=e93]:
                    - cell "Why are \"Double Falsehood\", \"The Reign of Edward III\" and other \"lost plays\" not included? This site is faithful to the First Folio. I'm not interested in any aspects of the \"Authorship Debate\" because the question of \"who really wrote the plays\" is completely irrelevant to acting in, or directing, the plays. The \"lost plays\" or \"new plays\" have become a part of that debate, so to avoid that controversy altogether I stick with the original complete works as published in the First Folio." [ref=e94]:
