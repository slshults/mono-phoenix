                      - generic [ref=e106]: I don't like ads. Why are there so many ads on the site?
                      - generic [ref=e107]:
                        - text: For the same reason you see ads in the program when you see a play. Production (of any kind) is not free, so I need to try to recover a little bit of the money I lose on this site (by running ads.)
                        - text: "In the interest of full transparency: Our ad revenue averages about $200 per month during the school year, and about $100 per month in the summer (the best month ever was $500, but that was back before the economy crashed in 2008.) The ad revenue almost covers the costs of creating and maintaining the site. Almost. Sometimes. Your \"donations\" via the Tip Jar button are much appreciated. (Since the autumn of 2008, donations have totalled less than $200. That's not per year, that's total.)"
