                        - text: .
                  - row "What's with The Men and The Women? Why so cis? We fully support all forms of gender identity and expression. The categories The Men and The Women refer to the gender of the character in the play. Your gender identity does not need to match that of the character when selecting a monologue from Shakespeare's plays, unless you want it to. Remember that in Shakespeare's day all of The Women characters were played by men, and 1/5th of his plays include at least one cross-dressing character. It may also be helpful to remember that Shakespeare died in the year 1616, hundreds of years before our modern cultural divides were being fanned by politicians to gain power, and by cable news to increase ad revenue. Gender fluidity has been part of the human experience all along, and will always be." [ref=e99]:
